{% extends "base.html" %}
{% block title %}Login – HeartPredict{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 2.5rem 2.25rem;
  }
  .auth-logo {
    width: 52px; height: 52px;
    background: var(--primary);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 1.5rem;
    margin: 0 auto 1.25rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" data-aos="fade-up">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-heart-pulse-fill"></i></div>
      <h4 class="fw-bold mb-1" style="letter-spacing:-0.3px;">Welcome back</h4>
      <p class="text-muted mb-0" style="font-size:0.875rem;">Sign in to your HeartPredict account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-4">
      <span class="text-muted" style="font-size:0.875rem;">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">
          Register
        </a>
      </span>
    </div>
  </div>
</div>
{% endblock %}
