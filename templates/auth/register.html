{% extends "base.html" %}

{% block title %}Register - HeartPredict{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Create Account</h3>
            <p class="text-muted">Join HeartPredict today</p>
          </div>

          <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="Choose a username" required minlength="3">
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="you@example.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Create a password (min 8 characters)" required minlength="8">
              </div>
            </div>

            <div class="mb-3">
              <label for="confirm_password" class="form-label">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                       placeholder="Confirm your password" required>
              </div>
            </div>

            <div class="mb-4">
              <label for="role" class="form-label">Account Type</label>
              <select class="form-select" id="role" name="role" required>
                <option value="user" selected>Patient / Regular User</option>
                <option value="doctor">Doctor / Healthcare Professional</option>
              </select>
              <div class="form-text">
                <i class="bi bi-info-circle"></i> Doctor accounts require admin approval before access.
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-check-circle me-2"></i>Create Account
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted">Already have an account? 
              <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
