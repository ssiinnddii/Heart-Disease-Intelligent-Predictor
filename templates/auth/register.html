{% extends "base.html" %}
{% block title %}Register – HeartPredict{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }
  .auth-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 2.5rem 2.25rem;
  }
  .auth-logo {
    width: 52px; height: 52px;
    background: var(--primary);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 1.5rem;
    margin: 0 auto 1.25rem;
  }
  .role-option {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }
  .role-option:hover { border-color: var(--primary); background: var(--primary-light); }
  .role-option input[type="radio"] { margin-top: 3px; accent-color: var(--primary); }
  .role-option .role-title { font-weight: 600; font-size: 0.875rem; }
  .role-option .role-desc  { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" data-aos="fade-up">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
      <h4 class="fw-bold mb-1" style="letter-spacing:-0.3px;">Create your account</h4>
      <p class="text-muted mb-0" style="font-size:0.875rem;">Join HeartPredict today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Choose a username" required minlength="3">
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Minimum 8 characters" required minlength="8">
        </div>
      </div>

      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                 placeholder="Re-enter your password" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label d-block mb-2">Account Type</label>
        <div class="d-flex flex-column gap-2">
          <label class="role-option">
            <input type="radio" name="role" value="user" checked>
            <div>
              <div class="role-title"><i class="bi bi-person-fill me-1 text-primary"></i>Patient</div>
              <div class="role-desc">Track your personal heart health assessments</div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="doctor">
            <div>
              <div class="role-title"><i class="bi bi-hospital me-1 text-success"></i>Healthcare Professional</div>
              <div class="role-desc">Monitor patients — requires admin approval before access</div>
            </div>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-check-circle me-2"></i>Create Account
      </button>
    </form>

    <div class="text-center mt-4">
      <span class="text-muted" style="font-size:0.875rem;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold text-decoration-none">
          Sign In
        </a>
      </span>
    </div>
  </div>
</div>
{% endblock %}
