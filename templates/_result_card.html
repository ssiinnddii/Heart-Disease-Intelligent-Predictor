<!-- Risk banner -->
<div class="card border-0 text-center p-4 result-card
  {% if result.risk_level == 'Low' %}bg-success bg-opacity-10 border border-success{% endif %}
  {% if result.risk_level == 'Medium' %}bg-warning bg-opacity-10 border border-warning{% endif %}
  {% if result.risk_level == 'High' %}bg-danger bg-opacity-10 border border-danger{% endif %}
">
  <div class="display-5 mb-2 result-icon">
    {% if result.risk_level == 'Low' %}
      <i class="bi bi-shield-check text-success"></i>
    {% elif result.risk_level == 'Medium' %}
      <i class="bi bi-exclamation-triangle text-warning"></i>
    {% else %}
      <i class="bi bi-x-octagon text-danger"></i>
    {% endif %}
  </div>

  <h3 class="fw-bold mb-1">
    {% if result.prediction == 1 %}
      Heart Disease Detected
    {% else %}
      No Heart Disease Detected
    {% endif %}
  </h3>

  <p class="mb-3 text-muted">
    Risk Level:
    <span class="badge fs-6 risk-{{ result.risk_level }}">{{ result.risk_level }} Risk</span>
  </p>

  <div class="mx-auto" style="max-width:420px">
    <div class="d-flex justify-content-between mb-1 small text-muted">
      <span>0%</span>
      <span class="fw-bold text-dark">{{ result.probability }}% risk</span>
      <span>100%</span>
    </div>
    <div class="progress" style="height:1rem; border-radius:.5rem;">
      <div class="progress-bar progress-bar-animated
        {% if result.risk_level == 'Low' %}bg-success
        {% elif result.risk_level == 'Medium' %}bg-warning
        {% else %}bg-danger{% endif %}"
        role="progressbar"
        style="width: 0%"
        data-width="{{ result.probability }}"
        aria-valuenow="{{ result.probability }}" aria-valuemin="0" aria-valuemax="100">
      </div>
    </div>
  </div>
</div>
